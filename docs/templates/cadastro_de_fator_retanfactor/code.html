            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background font-body-base text-body-base min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-white text-primary flex justify-between items-center px-6 h-16 w-full sticky top-0 z-50 border-b border-gray-200 flat no shadows font-inter text-sm antialiased">
<div class="flex items-center gap-4">
<div class="text-xl font-black text-primary uppercase tracking-tight">RetanFactor</div>
</div>
<div class="flex items-center gap-4 hidden">
<!-- Search bar hidden -->
</div>
<div class="flex items-center gap-4">
<button class="text-secondary hover:bg-slate-50 transition-colors cursor-pointer active:opacity-80 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">schedule</span>
</button>
<button class="text-secondary hover:bg-slate-50 transition-colors cursor-pointer active:opacity-80 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">sensors</span>
</button>
<button class="text-secondary hover:bg-slate-50 transition-colors cursor-pointer active:opacity-80 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<div class="flex flex-1 overflow-hidden relative">
<!-- SideNavBar -->
<nav class="bg-surface-container-low text-primary hidden md:flex flex-col pt-4 fixed left-0 top-16 h-[calc(100vh-64px)] z-40 w-64 border-r border-gray-200 flat no shadows">
<div class="px-4 pb-6 border-b border-gray-200 mb-4 flex flex-col items-center">
<img alt="Company Logo" class="w-32 h-auto mb-3 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujcgXCgLhIzn4gZG-9UhwUoUqqqH3_PrLCH9OdDksVeV1ICLQ8I5MLCwWAwUMWGt9VxBBQfOMCwaGuAmiSwLr0-x1mY6cyyp5-atOS0s4ySwDYGc0bz_jmCP8wnIdT30sFDrljpP8PqVp0CkW0klu6YsxXc-liVYQZ1hme3hsleLEjvrghW-DdV3KiFHTyYLQrd9Tf7SgV0WpeKyGYt5q2wti6RCemOs29TCKsqzecLgeg-J00kRMtPJ-_okq4tYwKhBiTBKA"/>
<div class="font-section-title text-section-title text-primary text-center">Plant Ops</div>
<div class="font-label-sm text-label-sm text-secondary text-center mt-1">Sector A-12</div>
</div>
<ul class="flex flex-col flex-1 space-y-1 font-inter text-xs font-semibold uppercase tracking-wider">
<li>
<a class="text-secondary flex items-center px-4 py-3 border-l-4 border-transparent hover:bg-gray-100 hover:text-primary duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">analytics</span>
                        Recruitment Report
                    </a>
</li>
<li>
<a class="bg-white text-primary border-l-4 border-primary flex items-center px-4 py-3 shadow-sm duration-200 ease-in-out font-bold" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">app_registration</span>
                        Factor Registration
                    </a>
</li>
<li>
<a class="text-secondary flex items-center px-4 py-3 border-l-4 border-transparent hover:bg-gray-100 hover:text-primary duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">history_edu</span>
                        Factor History
                    </a>
</li>
</ul>
</nav>
<!-- Main Content Area -->
<main class="flex-1 md:ml-64 p-margin-page overflow-y-auto bg-background">
<div class="max-w-[600px] mx-auto">
<div class="mb-stack-md">
<h1 class="font-h1 text-h1 text-on-background mb-stack-sm">Cadastro de Fator de Recurtimento</h1>
<p class="font-body-base text-body-base text-on-surface-variant">Configure os parâmetros de recurtimento para artigos específicos.</p>
</div>
<div class="bg-surface-container-lowest border border-surface-variant rounded shadow-sm p-padding-card">
<form class="flex flex-col gap-stack-md">
<!-- Row 1: Código & Descrição -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
<div class="md:col-span-4 flex flex-col gap-unit relative group">
<label class="font-label-sm text-label-sm text-on-background flex items-center gap-1" for="codigo_artigo">
                                    Código do artigo
                                    <span class="material-symbols-outlined text-[14px] text-outline cursor-help" title="Selecione o código SKP do artigo a ser configurado.">info</span>
</label>
<div class="relative">
<input class="w-full h-[40px] px-3 border border-outline-variant rounded bg-surface-container-lowest text-on-background focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none font-body-base text-body-base" id="codigo_artigo" name="codigo_artigo" placeholder="Ex: ART-1024" type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">arrow_drop_down</span>
</div>
</div>
<div class="md:col-span-8 flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="descricao_artigo">Descrição do artigo</label>
<input class="w-full h-[40px] px-3 border border-surface-variant rounded bg-surface-container text-on-surface-variant font-body-base text-body-base cursor-not-allowed" id="descricao_artigo" name="descricao_artigo" readonly="" tabindex="-1" type="text" value="Chapa de Aço Carbono 5mm"/>
</div>
</div>
<!-- Row 2: Fator -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter border-t border-surface-variant pt-stack-md">
<div class="md:col-span-4 flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-background flex items-center gap-1" for="fator">
                                    Fator
                                    <span aria-hidden="true" class="text-error">*</span>
<span class="material-symbols-outlined text-[14px] text-outline cursor-help" title="Valor numérico decimal maior que zero.">info</span>
</label>
<input class="w-full h-[40px] px-3 border border-outline-variant rounded bg-surface-container-lowest text-on-background focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none font-body-base text-body-base" id="fator" min="0.001" name="fator" placeholder="0.000" required="" step="0.001" type="number"/>
</div>
</div>
<!-- Row 3: Datas -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
<div class="md:col-span-6 flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-background flex items-center gap-1" for="data_inicio">
                                    Data início vigência
                                    <span aria-hidden="true" class="text-error">*</span>
</label>
<div class="relative">
<input class="w-full h-[40px] px-3 border border-outline-variant rounded bg-surface-container-lowest text-on-background focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none font-body-base text-body-base" id="data_inicio" name="data_inicio" required="" type="date"/>
</div>
</div>
<div class="md:col-span-6 flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-background flex items-center gap-1" for="data_fim">
                                    Data fim vigência
                                    <span class="text-outline font-normal text-[10px] ml-1">(Opcional)</span>
</label>
<div class="relative">
<input class="w-full h-[40px] px-3 border border-outline-variant rounded bg-surface-container-lowest text-on-background focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none font-body-base text-body-base" id="data_fim" name="data_fim" type="date"/>
</div>
</div>
</div>
<!-- Row 4: Observação -->
<div class="grid grid-cols-1 gap-gutter border-t border-surface-variant pt-stack-md mt-stack-sm">
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-background" for="observacao">Observação</label>
<textarea class="w-full px-3 py-2 border border-outline-variant rounded bg-surface-container-lowest text-on-background focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none font-body-base text-body-base resize-y" id="observacao" name="observacao" placeholder="Insira detalhes adicionais sobre este fator..." rows="4"></textarea>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-end gap-stack-sm mt-stack-md pt-stack-md border-t border-surface-variant">
<button class="h-[40px] px-4 py-2 border border-outline text-secondary bg-transparent hover:bg-surface-variant rounded font-body-bold text-body-bold transition-colors" type="button">
                                Cancelar/Limpar
                            </button>
<button class="h-[40px] px-4 py-2 border border-transparent text-on-primary bg-primary-container hover:bg-primary rounded font-body-bold text-body-bold transition-colors shadow-sm flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                                Salvar Fator
                            </button>
</div>
</form>
</div>
</div>
</main>
</div>
</body></html>
