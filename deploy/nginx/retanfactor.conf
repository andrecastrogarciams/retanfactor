# Nginx — Retanfactor (Produção)
# Caminho sugerido: /etc/nginx/sites-available/retanfactor
# Ativar: ln -s /etc/nginx/sites-available/retanfactor /etc/nginx/sites-enabled/
# Recarregar: sudo nginx -t && sudo systemctl reload nginx
#
# CONFIGURAÇÃO OBRIGATÓRIA ANTES DO DEPLOY:
#   1. Substituir os blocos allow/deny com os IPs/hostnames reais da rede interna.
#   2. Ajustar server_name para o hostname/IP do servidor de produção.
#   3. (Opcional) Habilitar TLS adicionando bloco ssl_certificate.

# ---------------------------------------------------------------------------
# Upstream — Streamlit Produção (porta 8501)
# ---------------------------------------------------------------------------
upstream retanfactor_prod {
    server 127.0.0.1:8501;
}

# ---------------------------------------------------------------------------
# Upstream — Streamlit Homologação (porta 8502)
# ---------------------------------------------------------------------------
upstream retanfactor_hml {
    server 127.0.0.1:8502;
}

# ---------------------------------------------------------------------------
# Servidor Produção
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name retanfactor.local;   # ajustar para hostname/IP real

    # --- Allowlist de acesso (AC Story 3.1) ---
    # Adicione aqui os IPs/faixas autorizados.
    # Exemplo: rede interna 192.168.1.0/24 e estação específica 10.0.0.5
    allow 192.168.1.0/24;
    # allow 10.0.0.5;
    deny all;

    # --- Logs ---
    access_log /var/log/nginx/retanfactor_prod_access.log combined;
    error_log  /var/log/nginx/retanfactor_prod_error.log warn;

    # --- Proxy para Streamlit ---
    location / {
        proxy_pass         http://retanfactor_prod;
        proxy_http_version 1.1;

        # WebSocket (obrigatório para Streamlit)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # --- Endpoint de health check (opcional) ---
    location /healthz {
        allow all;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ---------------------------------------------------------------------------
# Servidor Homologação
# ---------------------------------------------------------------------------
server {
    listen 8080;
    server_name retanfactor-hml.local;   # ajustar para hostname/IP real

    # Mesma allowlist — ajustar conforme necessário para hml
    allow 192.168.1.0/24;
    deny all;

    access_log /var/log/nginx/retanfactor_hml_access.log combined;
    error_log  /var/log/nginx/retanfactor_hml_error.log warn;

    location / {
        proxy_pass         http://retanfactor_hml;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    location /healthz {
        allow all;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
