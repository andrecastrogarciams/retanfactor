server {
    listen 80;
    server_name retanfactor.local;

    # PRD Story 3.1 AC2 — Allowlist de IPs internos
    # Substitua pelos IPs reais dos computadores liberados
    allow 192.168.1.0/24; 
    allow 127.0.0.1;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Streamlit WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Logs de acesso para auditoria (PRD Story 3.1 AC4)
    access_log /var/www/retanfactor/logs/nginx_access.log;
    error_log /var/www/retanfactor/logs/nginx_error.log;
}
